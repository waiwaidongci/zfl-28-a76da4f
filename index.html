<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高山驿站补给调度</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "PingFang SC", sans-serif; background: #edf2f2; color: #1f2a2f; }
    header { padding: 18px 24px; background: #fff; border-bottom: 1px solid #cfdbdc; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    h1 { margin: 0; font-size: 26px; }
    button { border: 0; border-radius: 8px; padding: 10px 13px; background: #315c72; color: #fff; font-weight: 800; cursor: pointer; }
    button.secondary { background: #6d7a80; }
    .app { display: grid; grid-template-columns: 320px 1fr 330px; gap: 16px; padding: 16px; }
    .panel, .card, .stat { background: #fff; border: 1px solid #cfdbdc; border-radius: 8px; padding: 14px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat strong { display: block; font-size: 24px; }
    .routes { display: grid; gap: 12px; }
    .card { display: grid; gap: 8px; }
    select { width: 100%; padding: 9px; border: 1px solid #cfdbdc; border-radius: 6px; }
    .log { height: 360px; overflow: auto; display: flex; flex-direction: column-reverse; gap: 8px; }
    .entry { border-left: 4px solid #315c72; padding: 8px; background: #f5f8f8; border-radius: 6px; }
    .danger { color: #a33d31; font-weight: 800; }
    .ok { color: #3f7a54; font-weight: 800; }
    .overlay { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(20,30,35,.42); }
    .modal { width: min(430px, calc(100% - 28px)); background: #fff; border-radius: 8px; padding: 22px; border: 1px solid #cfdbdc; }
    .hidden { display: none; }
    .diff-options { display: grid; gap: 10px; margin: 16px 0; }
    .diff-card { border: 2px solid #cfdbdc; border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color .2s, background .2s; }
    .diff-card:hover { background: #f0f5f5; }
    .diff-card.selected { border-color: #315c72; background: #e8f0f2; }
    .diff-card h3 { margin: 0 0 4px; }
    .diff-card p { margin: 0; font-size: 13px; color: #5a6e78; }
    .diff-label { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 800; color: #fff; }
    .diff-label.safe { background: #3f7a54; }
    .diff-label.normal { background: #b08a28; }
    .diff-label.hard { background: #a33d31; }
    @media (max-width: 1000px) { header { display: block; } .app { grid-template-columns: 1fr; } .log { height: 220px; } }
    .codex-btn { font-size: 13px; padding: 6px 14px; margin-left: 10px; vertical-align: middle; background: #4a7c5e; }
    .codex-btn:hover { background: #3a6a4e; }
    .section-title { display: flex; align-items: center; }
    .codex-grid { display: grid; gap: 14px; margin-top: 12px; max-height: 60vh; overflow-y: auto; padding-right: 4px; }
    .codex-card { border: 1px solid #cfdbdc; border-radius: 8px; padding: 14px; background: #f5f8f8; }
    .codex-card h3 { margin: 0 0 8px; font-size: 16px; color: #1f2a2f; }
    .codex-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; border-bottom: 1px dashed #dde5e6; }
    .codex-row:last-child { border-bottom: none; }
    .codex-row span:first-child { color: #5a6e78; }
    .codex-bar { height: 6px; border-radius: 3px; background: #dde5e6; margin-top: 2px; overflow: hidden; margin-bottom: 6px; }
    .codex-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
    .codex-bar-fill.risk { background: #a33d31; }
    .codex-bar-fill.reward { background: #3f7a54; }
    .codex-bar-fill.block { background: #5a7fa8; }
    .event-card { background: linear-gradient(135deg, #f8fbfb 0%, #eef4f5 100%); border: 2px solid #315c72; border-radius: 12px; padding: 20px; max-width: 480px; }
    .event-card h3 { margin: 0 0 8px; color: #1f2a2f; font-size: 20px; }
    .event-category { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 800; color: #fff; margin-bottom: 10px; }
    .event-category.weather { background: #5a7fa8; }
    .event-category.supply { background: #b08a28; }
    .event-category.guide { background: #4a7c5e; }
    .event-category.reputation { background: #8a5a9e; }
    .event-category.random { background: #a33d31; }
    .event-desc { font-size: 15px; line-height: 1.6; color: #2d3a40; margin: 12px 0 16px; padding: 12px; background: rgba(255,255,255,0.7); border-radius: 6px; border-left: 3px solid #315c72; }
    .event-options { display: grid; gap: 10px; }
    .event-option { border: 2px solid #cfdbdc; border-radius: 8px; padding: 12px 14px; cursor: pointer; background: #fff; transition: all .2s; text-align: left; }
    .event-option:hover { border-color: #315c72; background: #f0f7f8; transform: translateY(-1px); }
    .event-option:active { transform: translateY(0); }
    .event-option-title { font-weight: 800; color: #1f2a2f; margin-bottom: 4px; }
    .event-option-hint { font-size: 12px; color: #5a6e78; }
    .event-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; font-weight: 700; }
    .tag-good { background: #d4ede0; color: #3f7a54; }
    .tag-bad { background: #f2d9d6; color: #a33d31; }
    .tag-neutral { background: #e3ecf1; color: #315c72; }
    .codex-event { border-left: 4px solid #8a5a9e; }
    .codex-event h4 { margin: 6px 0; font-size: 14px; }
    .codex-event .choice-tag { font-size: 12px; color: #5a6e78; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .stat-item { font-size: 13px; }
    .stat-item span:first-child { color: #5a6e78; }
    @media (max-width: 1000px) { header { display: block; } .app { grid-template-columns: 1fr; } .log { height: 220px; } .event-card { max-width: calc(100% - 28px); } }
    .archive-btn { font-size: 13px; padding: 6px 14px; margin-left: 10px; vertical-align: middle; background: #8a5a9e; }
    .archive-btn:hover { background: #7a4a8e; }
    .archive-filter { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .archive-filter button { padding: 6px 12px; font-size: 13px; background: #6d7a80; }
    .archive-filter button.active { background: #315c72; }
    .archive-list { display: grid; gap: 12px; max-height: 60vh; overflow-y: auto; padding-right: 4px; }
    .archive-card { border: 1px solid #cfdbdc; border-radius: 8px; padding: 14px; background: #f5f8f8; }
    .archive-card.win { border-left: 4px solid #3f7a54; }
    .archive-card.lose { border-left: 4px solid #a33d31; }
    .archive-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .archive-title { font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .archive-badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 800; color: #fff; }
    .archive-badge.win { background: #3f7a54; }
    .archive-badge.lose { background: #a33d31; }
    .archive-date { font-size: 12px; color: #5a6e78; }
    .archive-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }
    .archive-stat { background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #dde5e6; }
    .archive-stat-label { font-size: 11px; color: #5a6e78; display: block; }
    .archive-stat-value { font-size: 16px; font-weight: 800; color: #1f2a2f; }
    .archive-detail { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #dde5e6; font-size: 13px; }
    .archive-detail-row { display: flex; justify-content: space-between; padding: 3px 0; }
    .archive-detail-row span:first-child { color: #5a6e78; }
    .archive-log { margin-top: 8px; padding: 8px; background: #fff; border-radius: 6px; font-size: 12px; max-height: 100px; overflow-y: auto; border: 1px solid #dde5e6; }
    .archive-log-entry { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .archive-log-entry:last-child { border-bottom: none; }
    .archive-empty { text-align: center; padding: 40px 20px; color: #5a6e78; }
    .archive-actions { display: flex; gap: 10px; margin-top: 14px; }
    .archive-actions button { flex: 1; }
    .btn-danger { background: #a33d31; }
    .btn-danger:hover { background: #8a2d21; }
    .confirm-overlay { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(20,30,35,.6); z-index: 1000; }
    .confirm-overlay.hidden { display: none; }
    .confirm-modal { width: min(380px, calc(100% - 28px)); background: #fff; border-radius: 8px; padding: 22px; border: 1px solid #cfdbdc; }
    .confirm-modal h3 { margin: 0 0 10px; }
    .confirm-modal p { margin: 0 0 16px; color: #5a6e78; }
    .confirm-buttons { display: flex; gap: 10px; }
    .confirm-buttons button { flex: 1; }
    .route-preference { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .route-tag { padding: 2px 6px; background: #e8f0f2; border-radius: 4px; font-size: 11px; color: #315c72; }
    .scenario-title { margin: 0 0 4px; font-size: 18px; color: #1f2a2f; }
    .scenario-subtitle { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .scenario-desc { font-size: 12px; color: #5a6e78; line-height: 1.5; margin: 6px 0 0; }
    .scenario-info { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #dde5e6; font-size: 12px; color: #5a6e78; }
    .scenario-info-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .scenario-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0 14px; }
    .scenario-card { border: 2px solid #cfdbdc; border-radius: 8px; padding: 12px; cursor: pointer; transition: all .2s; }
    .scenario-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .scenario-card.selected { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.12); }
    .setup-section-title { font-size: 14px; font-weight: 800; color: #315c72; margin: 8px 0 6px; display: flex; align-items: center; gap: 6px; }
    .setup-section-title::before { content: ""; display: inline-block; width: 4px; height: 16px; background: #315c72; border-radius: 2px; }
    .scenario-badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 800; color: #fff; }
    .archive-scenario-tag { padding: 2px 6px; border-radius: 3px; font-size: 11px; color: #fff; font-weight: 800; }
    .setup-modal { width: min(780px, calc(100% - 28px)); max-height: 90vh; overflow-y: auto; }
    @media (max-width: 600px) {
      .scenario-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div><h1>高山驿站补给调度 · <span id="scenarioName" style="color:#315c72">标准雪线</span></h1><div id="scenarioIntro">撑过15天，接应商队，让驿站不断粮。</div></div>
    <button id="newBtn">新开一局</button>
  </header>
  <main class="app">
    <aside class="panel">
      <h2>驿站</h2>
      <div class="stats">
        <div class="stat"><span>天数</span><strong id="dayText">1 / 15</strong></div>
        <div class="stat"><span>天气</span><strong id="weatherText">晴</strong></div>
        <div class="stat"><span>柴火</span><strong id="woodText">20</strong></div>
        <div class="stat"><span>药品</span><strong id="medText">8</strong></div>
        <div class="stat"><span>干粮</span><strong id="foodText">24</strong></div>
        <div class="stat"><span>声望</span><strong id="repText">0</strong></div>
      </div>
      <h2>向导</h2>
      <div id="guides"></div>
    </aside>
    <section class="panel">
      <div class="section-title"><h2>今日路线</h2><button class="codex-btn" id="codexBtn">路线图鉴</button></div>
      <div class="routes" id="routes"></div>
      <button id="endDayBtn">执行调度并进入明天</button>
    </section>
    <aside class="panel">
      <h2>事件日志</h2>
      <div class="log" id="log"></div>
    </aside>
  </main>
  <div class="overlay hidden" id="diffOverlay">
    <div class="modal setup-modal">
      <h2>赛季剧本与难度设置</h2>
      <div class="setup-section-title">选择赛季剧本</div>
      <div class="scenario-options" id="scenarioOptions"></div>
      <div class="setup-section-title">选择开局难度</div>
      <div class="diff-options" id="diffOptions">
        <div class="diff-card" data-diff="safe">
          <h3><span class="diff-label safe">稳妥</span></h3>
          <p>物资充裕 · 暴雪较少 · 疲劳增长缓慢</p>
        </div>
        <div class="diff-card selected" data-diff="normal">
          <h3><span class="diff-label normal">标准</span></h3>
          <p>标准物资 · 正常天气 · 常规疲劳</p>
        </div>
        <div class="diff-card" data-diff="hard">
          <h3><span class="diff-label hard">险境</span></h3>
          <p>物资紧缺 · 暴雪频繁 · 疲劳增长剧烈</p>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button id="startBtn" style="flex:1">开始剧本</button>
        <button class="codex-btn" id="diffCodexBtn" style="flex:1">查看路线图鉴</button>
        <button class="archive-btn" id="archiveBtn" style="flex:1">结算档案馆</button>
      </div>
    </div>
  </div>
  <div class="overlay hidden" id="archiveOverlay">
    <div class="modal" style="width:min(780px,calc(100% - 28px));max-height:85vh;overflow-y:auto">
      <h2>结算档案馆</h2>
      <div class="archive-filter">
        <button data-filter="recent" class="active">最近游玩</button>
        <button data-filter="win">胜利记录</button>
        <button data-filter="lose">失败记录</button>
        <button data-filter="rep">最高声望</button>
        <button data-filter="standard" style="background:#315c72">标准雪线</button>
        <button data-filter="medshortage" style="background:#a33d31">药品短缺</button>
        <button data-filter="caravan" style="background:#b08a28">商队旺季</button>
        <button data-filter="rescue" style="background:#5a7fa8">封山救援</button>
      </div>
      <div class="archive-list" id="archiveList"></div>
      <div class="archive-actions">
        <button id="archiveCloseBtn">关闭</button>
        <button class="btn-danger" id="clearArchiveBtn">清空档案</button>
      </div>
    </div>
  </div>
  <div class="confirm-overlay hidden" id="confirmOverlay">
    <div class="confirm-modal">
      <h3 id="confirmTitle">确认操作</h3>
      <p id="confirmText">确定要执行此操作吗？</p>
      <div class="confirm-buttons">
        <button class="secondary" id="confirmCancelBtn">取消</button>
        <button class="btn-danger" id="confirmOkBtn">确定</button>
      </div>
    </div>
  </div>
  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <h2 id="resultTitle"></h2>
      <p id="resultText"></p>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button id="againBtn" style="flex:1">再来一局</button>
        <button class="codex-btn" id="resultCodexBtn" style="flex:1">查看本局图鉴</button>
      </div>
    </div>
  </div>
  <div class="overlay hidden" id="codexOverlay">
    <div class="modal" style="width:min(560px,calc(100% - 28px));max-height:85vh;overflow-y:auto">
      <h2>游戏图鉴</h2>
      <div class="codex-grid" id="codexGrid"></div>
      <button id="codexCloseBtn" style="margin-top:14px">关闭图鉴</button>
    </div>
  </div>
  <div class="overlay hidden" id="eventOverlay">
    <div class="event-card">
      <span class="event-category" id="eventCategory"></span>
      <h3 id="eventTitle"></h3>
      <div class="event-desc" id="eventDesc"></div>
      <div class="event-options" id="eventOptions"></div>
    </div>
  </div>
  <script>
    const routesBase = [
      { id: "north", name: "北坡盐道", risk: 2, reward: 3, wood: 2, food: 3, med: 1, desc: "翻越北坡的古老盐道，沿途有零星盐晶可以换取物资。路途稍长但相对平缓，是稳妥的补给路线。" },
      { id: "ridge", name: "雪脊短线", risk: 3, reward: 4, wood: 3, food: 2, med: 1, desc: "沿雪线山脊穿行的险峻捷径，能最快抵达山外。途中常有落石与冰缝，但接应商队效率最高。" },
      { id: "valley", name: "松谷绕行", risk: 1, reward: 2, wood: 1, food: 4, med: 0, desc: "绕过松林谷地的安全路线，几乎没有雪崩风险。林间可以采集少量食物，但路程较远收益偏低。" },
      { id: "glacier", name: "冰原直道", risk: 5, reward: 5, wood: 4, food: 2, med: 2, desc: "横穿冰川的极限通道，暴雪天气中仍可强行通过。极度危险但距离最短，救援时必走此路。" },
      { id: "herbal", name: "草药小径", risk: 2, reward: 2, wood: 1, food: 2, med: -1, desc: "通往高山草药园的隐秘小路，沿途可采集中草药。消耗药品少，甚至能补充药材。" },
      { id: "market", name: "集市古道", risk: 1, reward: 3, wood: 2, food: 1, med: 1, desc: "通向山外集市的繁忙商道，旺季时商队络绎不绝。路好走、商队多，是旺季补给的黄金路线。" },
      { id: "cliff", name: "悬崖索道", risk: 4, reward: 3, wood: 3, food: 1, med: 2, desc: "架设在悬崖之间的古老索道，封山时期少数仍能通行的路径。高空寒风凛冽，需额外御寒。" }
    ];
    const ALL_ROUTES_MAP = {};
    routesBase.forEach(r => ALL_ROUTES_MAP[r.id] = r);
    const DIFF = {
      safe:   { label: "稳妥", cls: "safe",   wood: 28, med: 12, food: 32, stormProb: 0.15, fatigueBase: 1, fatigueStorm: 1, fatigueMul: 0.8 },
      normal: { label: "标准", cls: "normal", wood: 20, med: 8,  food: 24, stormProb: 0.24, fatigueBase: 1, fatigueStorm: 2, fatigueMul: 1.0 },
      hard:   { label: "险境", cls: "hard",   wood: 14, med: 5,  food: 16, stormProb: 0.36, fatigueBase: 2, fatigueStorm: 3, fatigueMul: 1.3 }
    };
    const EVENTS_POOL = [
      {
        id: "storm_warning", category: "weather", name: "暴雪预警",
        desc: "山间传来低沉的轰鸣，云层正在迅速聚集。老向导说这是暴风雪来临的前兆，但也有人说只是普通的阴风。",
        baseWeight: 5,
        conditions: { minDay: 2, maxDay: 14 },
        weightMod: { weather: { "晴": 1.2, "阴风": 1.8, "暴雪": 0.3 }, diff: { safe: 0.8, normal: 1.0, hard: 1.4 } },
        options: [
          { title: "加固驿站，囤积柴火", hint: "消耗柴火，但降低未来暴雪影响",
            effects: { wood: -3, weatherModifier: { stormProb: -0.08, days: 3 }, log: "决定加固驿站，消耗柴火应对暴雪。" } },
          { title: "观察云层，静观其变", hint: "节省物资，但风险较高",
            effects: { weatherModifier: { stormProb: 0.15, days: 2 }, log: "决定观察天气变化，节省物资。" } }
        ]
      },
      {
        id: "traveler_merchant", category: "supply", name: "过路商人",
        desc: "一位披着厚斗篷的商人途径驿站，愿意用高价收购多余的药品，或者用物资换取声望。",
        baseWeight: 4,
        conditions: { minDay: 1, maxDay: 13, minMed: 3 },
        weightMod: { med: { low: 0.5, medium: 1.0, high: 1.5 }, rep: { low: 1.3, medium: 1.0, high: 0.7 } },
        options: [
          { title: "出售药品换粮", hint: "+6干粮 -3药品",
            effects: { med: -3, food: 6, log: "向商人出售了药品，换取了干粮。" } },
          { title: "赠送药品博取名声", hint: "+5声望 -2药品",
            effects: { med: -2, rep: 5, log: "向商人赠送了药品，博得了好名声。" } }
        ]
      },
      {
        id: "guide_injury", category: "guide", name: "向导受伤",
        desc: "一名向导在昨日的归途中不慎扭伤了脚踝，需要立即处理。是让他带伤坚持，还是让他休息恢复？",
        baseWeight: 4,
        conditions: { minDay: 3, maxDay: 14 },

      let html = '<h3 style="margin:0 0 8px;color:' + sc.color + '">剧本概览 · ' + sc.name + '</h3>';
      html += '<div class="codex-card">' +
        '<div class="codex-row"><span>剧本</span><span><span class="scenario-badge" style="background:'+sc.color+'">' + sc.subtitle + '</span> ' + sc.name + '</span></div>' +
        '<div class="codex-row"><span>目标</span><span>' + sc.win.label + '</span></div>' +
        '<div class="codex-row"><span>可用路线</span><span>' + sr.length + ' 条</span></div>' +
        '<div class="codex-row"><span>事件触发率</span><span>' + Math.round(sc.eventTriggerChance * 100) + '%</span></div>' +
        (rewardBonus > 0 ? '<div class="codex-row"><span>全局声望加成</span><span>+' + rewardBonus + ' / 次</span></div>' : '') +
        '<div style="font-size:12px;color:#5a6e78;line-height:1.5;margin-top:6px">' + sc.desc + '</div>' +
        '</div>';
      html += '<h3 style="margin:12px 0 8px;color:' + sc.color + '">路线图鉴</h3>';
      html += sr.map(r => {
        const c = (game && game.codex) ? (game.codex[r.id] || getDefaultCodex(r.id)) : getDefaultCodex(r.id);
        const blockProb = c.seen > 0 ? Math.round(c.blocked / c.seen * 100) : 0;
        const successRate = c.attempts > 0 ? Math.round(c.successes / c.attempts * 100) : 0;
        const riskPct = Math.min(c.risk / 5 * 100, 100);
        const rewardPct = Math.min((c.reward + rewardBonus) / 7 * 100, 100);
        const noData = c.seen === 0;
        const displayReward = c.reward + rewardBonus;
        return '<div class="codex-card"><h3 style="color:' + sc.color + '">' + c.name + '</h3>' +
          '<div style="font-size:13px;color:#5a6e78;margin-bottom:10px;line-height:1.5">' + r.desc + '</div>' +
          '<div class="codex-row"><span>调度消耗</span><span>柴 ' + r.wood + ' · 粮 ' + r.food + ' · 药 ' + (r.med > 0 ? r.med : '+' + Math.abs(r.med)) + '</span></div>' +
          '<div class="codex-row"><span>基础风险</span><span>' + c.risk + ' / 5</span></div>' +
          '<div class="codex-bar"><div class="codex-bar-fill risk" style="width:' + riskPct + '%"></div></div>' +
          '<div class="codex-row"><span>常见声望收益</span><span>' + displayReward + ' / 次' + (rewardBonus > 0 ? '（含剧本加成）' : '') + '</span></div>' +
          '<div class="codex-bar"><div class="codex-bar-fill reward" style="width:' + rewardPct + '%"></div></div>' +
          '<div class="codex-row"><span>暴雪封路概率</span><span>' + (noData ? '暂无数据' : blockProb + '%（' + c.blocked + '/' + c.seen + '天）') + '</span></div>' +
          (noData ? '' : '<div class="codex-bar"><div class="codex-bar-fill block" style="width:' + blockProb + '%"></div></div>') +
          '<div class="codex-row"><span>历史成功次数</span><span>' + (noData ? '暂无数据' : c.successes + ' / ' + c.attempts + ' 次（' + successRate + '%）') + '</span></div>' +
          (noData ? '' : '<div class="codex-row"><span>累计收益</span><span>声望+' + c.rewards.rep + ' 柴+' + c.rewards.wood + ' 粮+' + c.rewards.food + ' 药+' + c.rewards.med + '</span></div>') +
        '</div>';
      }).join("");
      html += '<h3 style="margin:12px 0 8px;color:#8a5a9e">事件图鉴</h3>';
      if (game && game.eventStats) {
        html += '<div class="codex-card"><h4>本局事件统计</h4>' +
          '<div class="stats-grid">' +
          '<div class="stat-item"><span>触发总数</span><span>' + game.eventStats.triggered + ' 次</span></div>' +
          '<div class="stat-item"><span>天气事件</span><span>' + (game.eventStats.byCategory.weather || 0) + ' 次</span></div>' +
          '<div class="stat-item"><span>物资事件</span><span>' + (game.eventStats.byCategory.supply || 0) + ' 次</span></div>' +
          '<div class="stat-item"><span>向导事件</span><span>' + (game.eventStats.byCategory.guide || 0) + ' 次</span></div>' +
          '<div class="stat-item"><span>声望事件</span><span>' + (game.eventStats.byCategory.reputation || 0) + ' 次</span></div>' +
          '<div class="stat-item"><span>随机事件</span><span>' + (game.eventStats.byCategory.random || 0) + ' 次</span></div>' +
          '</div></div>';
      }
      html += EVENTS_POOL.map(e => {
        let weightNote = "";
        if (sc.eventWeightOverrides && sc.eventWeightOverrides[e.id]) {
          weightNote = ' <span class="event-tag tag-good">剧本权重×' + sc.eventWeightOverrides[e.id] + '</span>';
        } else if (sc.eventWeightMul && sc.eventWeightMul[e.category]) {
          const m = sc.eventWeightMul[e.category];
          if (m > 1.1) weightNote = ' <span class="event-tag tag-good">高频</span>';
          else if (m < 0.9) weightNote = ' <span class="event-tag tag-bad">低频</span>';
        }
        const c = (game && game.eventCodex) ? game.eventCodex[e.id] : { name: e.name, category: e.category, desc: e.desc, seen: 0, choices: {} };
        const noData = !c.seen;
        let choicesHtml = '';
        if (!noData && c.choices) {
          choicesHtml = '<div style="margin-top:8px">';
          Object.keys(c.choices).forEach(key => {
            const choice = c.choices[key];
            choicesHtml += '<div class="choice-tag">· ' + choice.title + '：选择 ' + choice.count + ' 次</div>';
          });
          choicesHtml += '</div>';
        }
        const catLabel = EVENT_CATEGORY_LABELS[c.category];
        return '<div class="codex-card codex-event"><span class="event-category ' + c.category + '" style="font-size:11px;padding:1px 8px">' + catLabel + '</span>' + weightNote +
          '<h4>' + c.name + '</h4>' +
          '<div style="font-size:12px;color:#5a6e78;line-height:1.5">' + c.desc + '</div>' +
          '<div class="codex-row"><span>触发次数</span><span>' + (noData ? '尚未触发' : c.seen + ' 次') + '</span></div>' +
          choicesHtml +
        '</div>';
      }).join("");
      if (game) {
        const d = DIFF[game.diff];
        html += '<h3 style="margin:12px 0 8px;color:' + sc.color + '">本局统计</h3>';
        html += '<div class="codex-card">' +
          '<div class="codex-row"><span>剧本</span><span>' + sc.name + '</span></div>' +
          '<div class="codex-row"><span>难度</span><span>' + d.label + '</span></div>' +
          '<div class="codex-row"><span>当前天数</span><span>' + game.day + ' / ' + game.targetDays + '</span></div>' +
          '<div class="codex-row"><span>接应商队</span><span>' + game.saved + ' 队' + (sc.win.type === 'caravans' || sc.win.type === 'caravans_and_rep' ? '（目标 ' + sc.win.count + '）' : '') + '</span></div>' +
          '<div class="codex-row"><span>当前声望</span><span>' + game.rep + (sc.win.type === 'days_and_rep' || sc.win.type === 'caravans_and_rep' ? '（目标 ' + sc.win.rep + '）' : '') + '</span></div>' +
          '<div class="codex-row"><span>当前物资</span><span>柴' + game.wood + ' 粮' + game.food + ' 药' + game.med + '</span></div>' +
          '<div class="codex-row"><span>向导状态</span><span>' + game.guides.map(g => g.name + '(' + g.fatigue + ')').join('、') + '</span></div>' +
          '<div class="codex-row"><span>事件触发</span><span>' + game.eventStats.triggered + ' 次</span></div>' +
        '</div>';
      }
      els.codexGrid.innerHTML = html;
    }
    function openCodex() {
      renderCodex();
      codexOverlay.classList.remove("hidden");
    }
    document.querySelector("#codexBtn").onclick = openCodex;
    document.querySelector("#diffCodexBtn").onclick = openCodex;
    document.querySelector("#resultCodexBtn").onclick = openCodex;
    document.querySelector("#codexCloseBtn").onclick = () => codexOverlay.classList.add("hidden");
    const ARCHIVE_STORAGE_KEY = "mountain_post_archives";
    const ARCHIVE_VERSION = 1;
    function getDefaultArchiveFields() {
      return {
        version: ARCHIVE_VERSION,
        id: null,
        win: false,
        scenario: "standard",
        scenarioLabel: "标准雪线",
        scenarioColor: "#315c72",
        day: 0,
        difficulty: "normal",
        difficultyLabel: "标准",
        savedCaravans: 0,
        reputation: 0,
        targetDays: 15,
        winTarget: null,
        minResources: { wood: 0, med: 0, food: 0 },
        failureReason: null,
        routePreference: { north: 0, ridge: 0, valley: 0 },
        keyLogs: [],
        timestamp: 0,
        dateStr: ""
      };
    }
    function migrateArchive(archive) {
      const defaults = getDefaultArchiveFields();
      const migrated = { ...defaults, ...archive };
      if (!migrated.minResources) migrated.minResources = { ...defaults.minResources };
      else migrated.minResources = { ...defaults.minResources, ...migrated.minResources };
      if (!migrated.routePreference) migrated.routePreference = { ...defaults.routePreference };
      else migrated.routePreference = { ...defaults.routePreference, ...migrated.routePreference };
      if (!migrated.keyLogs) migrated.keyLogs = [];
      if (!migrated.version) migrated.version = ARCHIVE_VERSION;
      if (!migrated.scenario) {
        migrated.scenario = "standard";
        migrated.scenarioLabel = "标准雪线";
        migrated.scenarioColor = "#315c72";
        migrated.targetDays = 15;
        migrated.winTarget = { type: "days", label: "坚守到最后" };
      }
      return migrated;
    }
    function loadGameArchives() {
      try {
        const stored = localStorage.getItem(ARCHIVE_STORAGE_KEY);
        if (!stored) return [];
        const data = JSON.parse(stored);
        if (!Array.isArray(data)) return [];
        return data.map(migrateArchive);
      } catch (e) {
        console.error("加载档案失败:", e);
        return [];
      }
    }
    function saveGameArchives(archives) {
      try {
        localStorage.setItem(ARCHIVE_STORAGE_KEY, JSON.stringify(archives));
      } catch (e) {
        console.error("保存档案失败:", e);
      }
    }
    function getKeyLogs() {
      const logs = [];
      const importantKeywords = ["【事件】", "成功", "受挫", "接应", "暴雪", "封路", "耗尽", "疲劳", "商队"];
      for (const log of game.log) {
        if (importantKeywords.some(kw => log.includes(kw))) {
          logs.push(log);
        }
        if (logs.length >= 10) break;
      }
      return logs;
    }
    function saveGameArchive(win) {
      const sc = game.scenarioConfig;
      const d = DIFF[game.diff];
      const now = new Date();
      const archive = {
        version: ARCHIVE_VERSION,
        id: now.getTime(),
        win: win,
        scenario: game.scenario,
        scenarioLabel: sc.name,
        scenarioColor: sc.color,
        scenarioSubtitle: sc.subtitle,
        targetDays: game.targetDays,
        winTarget: { ...sc.win },
        day: game.day,
        difficulty: game.diff,
        difficultyLabel: d.label,
        savedCaravans: game.saved,
        reputation: game.rep,
        minResources: { ...game.minResources },
        failureReason: win ? null : game.failureReason,
        routePreference: { ...game.routeDispatches },
        keyLogs: getKeyLogs(),
        timestamp: now.getTime(),
        dateStr: now.toLocaleString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })
      };
      const archives = loadGameArchives();
      archives.unshift(archive);
      if (archives.length > 100) archives.length = 100;
      saveGameArchives(archives);
    }
    let currentArchiveFilter = "recent";
    function sortArchives(archives, filter) {
      const sorted = [...archives];
      if (SCENARIOS[filter]) {
        return sorted.filter(a => a.scenario === filter).sort((a, b) => b.timestamp - a.timestamp);
      }
      switch (filter) {
        case "recent":
          sorted.sort((a, b) => b.timestamp - a.timestamp);
          break;
        case "win":
          return sorted.filter(a => a.win).sort((a, b) => b.timestamp - a.timestamp);
        case "lose":
          return sorted.filter(a => !a.win).sort((a, b) => b.timestamp - a.timestamp);
        case "rep":
          sorted.sort((a, b) => b.reputation - a.reputation);
          break;
      }
      return sorted;
    }
    function getRouteName(routeId) {
      const route = ALL_ROUTES_MAP[routeId];
      return route ? route.name : routeId;
    }
    function renderArchiveCard(archive) {
      const d = DIFF[archive.difficulty];
      const diffCls = d ? d.cls : "normal";
      const winCls = archive.win ? "win" : "lose";
      const winText = archive.win ? "胜利" : "失败";
      const scColor = archive.scenarioColor || "#315c72";
      let prefHtml = "";
      const routes = Object.entries(archive.routePreference).filter(([_, v]) => v > 0).sort((a, b) => b[1] - a[1]);
      if (routes.length > 0) {
        prefHtml = '<div class="route-preference">' + routes.map(([id, count]) =>
          '<span class="route-tag">' + getRouteName(id) + ' × ' + count + '</span>'
        ).join("") + '</div>';
      } else {
        prefHtml = '<div style="font-size:12px;color:#5a6e78">无派遣记录</div>';
      }
      let logsHtml = "";
      if (archive.keyLogs && archive.keyLogs.length > 0) {
        logsHtml = '<div class="archive-log">' + archive.keyLogs.map(log =>
          '<div class="archive-log-entry">' + log + '</div>'
        ).join("") + '</div>';
      }
      let targetInfo = "";
      if (archive.winTarget) {
        switch (archive.winTarget.type) {
          case "days": targetInfo = '坚守到第 ' + archive.targetDays + ' 天'; break;
          case "caravans": targetInfo = '接应 ≥ ' + archive.winTarget.count + ' 队'; break;
          case "days_and_rep": targetInfo = '声望 ≥ ' + archive.winTarget.rep; break;
          case "caravans_and_rep": targetInfo = '接应≥' + archive.winTarget.count + '队 且 声望≥' + archive.winTarget.rep; break;
        }
      }
      return '<div class="archive-card ' + winCls + '">' +
        '<div class="archive-header">' +
          '<div class="archive-title">' +
            '<span class="archive-badge ' + winCls + '">' + winText + '</span>' +
            '<span class="archive-scenario-tag" style="background:' + scColor + '">' + archive.scenarioLabel + '</span>' +
            '<span class="diff-label ' + diffCls + '">' + archive.difficultyLabel + '</span>' +
          '</div>' +
          '<div class="archive-date">' + archive.dateStr + '</div>' +
        '</div>' +
        '<div class="archive-stats">' +
          '<div class="archive-stat"><span class="archive-stat-label">天数进度</span><span class="archive-stat-value">第 ' + archive.day + ' / ' + (archive.targetDays || 15) + ' 天</span></div>' +
          '<div class="archive-stat"><span class="archive-stat-label">接应商队</span><span class="archive-stat-value">' + archive.savedCaravans + ' 队</span></div>' +
          '<div class="archive-stat"><span class="archive-stat-label">最终声望</span><span class="archive-stat-value">' + archive.reputation + '</span></div>' +
          '<div class="archive-stat"><span class="archive-stat-label">最低柴火</span><span class="archive-stat-value">' + archive.minResources.wood + '</span></div>' +
          '<div class="archive-stat"><span class="archive-stat-label">最低药品</span><span class="archive-stat-value">' + archive.minResources.med + '</span></div>' +
          '<div class="archive-stat"><span class="archive-stat-label">最低干粮</span><span class="archive-stat-value">' + archive.minResources.food + '</span></div>' +
        '</div>' +
        '<div class="archive-detail">' +
          '<div class="archive-detail-row"><span>胜利条件</span><span>' + targetInfo + '</span></div>' +
          (archive.failureReason ?
            '<div class="archive-detail-row"><span>主要失败原因</span><span class="danger">' + archive.failureReason + '</span></div>' : '') +
          '<div class="archive-detail-row"><span>路线派遣偏好</span><span></span></div>' +
          prefHtml +
          '<div class="archive-detail-row" style="margin-top:8px"><span>关键日志</span><span></span></div>' +
          logsHtml +
        '</div>' +
      '</div>';
    }
    function renderArchiveList() {
      const archives = loadGameArchives();
      const filtered = sortArchives(archives, currentArchiveFilter);
      if (filtered.length === 0) {
        els.archiveList.innerHTML = '<div class="archive-empty">暂无档案记录<br><span style="font-size:12px">完成一局游戏后将自动保存战绩</span></div>';
        return;
      }
      els.archiveList.innerHTML = filtered.map(renderArchiveCard).join("");
    }
    function openArchive() {
      currentArchiveFilter = "recent";
      document.querySelectorAll(".archive-filter button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === "recent");
      });
      renderArchiveList();
      els.archiveOverlay.classList.remove("hidden");
    }
    function closeArchive() {
      els.archiveOverlay.classList.add("hidden");
    }
    function showConfirm(title, text, onConfirm) {
      els.confirmTitle.textContent = title;
      els.confirmText.textContent = text;
      els.confirmOverlay.classList.remove("hidden");
      document.querySelector("#confirmOkBtn").onclick = () => {
        els.confirmOverlay.classList.add("hidden");
        onConfirm();
      };
      document.querySelector("#confirmCancelBtn").onclick = () => {
        els.confirmOverlay.classList.add("hidden");
      };
    }
    function clearAllArchives() {
      showConfirm("清空档案", "确定要清空所有档案记录吗？此操作无法撤销。", () => {
        saveGameArchives([]);
        renderArchiveList();
      });
    }
    document.querySelector("#archiveBtn").onclick = openArchive;
    document.querySelector("#archiveCloseBtn").onclick = closeArchive;
    document.querySelector("#clearArchiveBtn").onclick = clearAllArchives;
    document.querySelectorAll(".archive-filter button").forEach(btn => {
      btn.onclick = () => {
        currentArchiveFilter = btn.dataset.filter;
        document.querySelectorAll(".archive-filter button").forEach(b => b.classList.toggle("active", b === btn));
        renderArchiveList();
      };
    });
    showDiffPicker();
  </script>
</body>
</html>
