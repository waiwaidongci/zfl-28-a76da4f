<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>高山驿站 - 单元测试（真实游戏逻辑）</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "PingFang SC", sans-serif; background: #edf2f2; color: #1f2a2f; padding: 20px; }
    h1 { margin: 0 0 16px 0; font-size: 24px; }
    .test-container { max-width: 900px; margin: 0 auto; background: #fff; border: 1px solid #cfdbdc; border-radius: 8px; padding: 20px; }
    .test-summary { display: flex; gap: 16px; padding: 12px 16px; background: #f5f8f8; border-radius: 6px; margin-bottom: 16px; font-weight: 700; }
    .test-summary .pass { color: #3f7a54; }
    .test-summary .fail { color: #a33d31; }
    .test-summary .total { color: #315c72; }
    .test-suite { margin-bottom: 20px; }
    .test-suite-title { font-size: 16px; font-weight: 700; color: #315c72; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid #cfdbdc; }
    .test-case { padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .test-case.pass { background: #e8f4ec; color: #2d5a3d; }
    .test-case.fail { background: #fbe8e6; color: #7a2820; }
    .test-case .icon { font-size: 16px; }
    .test-case .name { flex: 1; }
    .test-case .error { font-size: 12px; color: #a33d31; margin-top: 4px; white-space: pre-wrap; }
    button { border: 0; border-radius: 8px; padding: 10px 20px; background: #315c72; color: #fff; font-weight: 800; cursor: pointer; font-size: 14px; }
    button:hover { background: #264a5c; }
    button:disabled { background: #8aa0a8; cursor: not-allowed; }
    .test-actions { margin-bottom: 16px; display: flex; gap: 10px; align-items: center; }
    .test-detail { margin-left: 24px; font-size: 12px; color: #5a6e78; margin-top: 4px; }
    .game-iframe { position: absolute; left: -9999px; top: -9999px; width: 1200px; height: 800px; }
    .status { color: #5a6e78; font-size: 14px; }
    .source-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: #3f7a54;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>🧪 高山驿站 · 单元测试 <span class="source-badge">真实游戏逻辑</span></h1>
    <div class="test-actions">
      <button id="runBtn" onclick="runAllTests()" disabled>▶ 运行所有测试</button>
      <span id="runInfo" class="status">正在加载真实游戏页面...</span>
    </div>
    <div class="test-summary">
      <span class="total">总计: <span id="totalCount">0</span></span>
      <span class="pass">通过: <span id="passCount">0</span></span>
      <span class="fail">失败: <span id="failCount">0</span></span>
    </div>
    <div id="testResults"></div>
  </div>

  <iframe id="gameFrame" class="game-iframe" src="index.html" onload="onGameLoaded()"></iframe>

  <script>
    // ===== 全局变量 =====
    let gameWindow = null;
    let testsReady = false;

    // 从游戏页面导出的纯函数和数据（测试真实游戏代码）
    let routesBase, ALL_ROUTES_MAP, DIFF, EVENTS_POOL, EVENT_CATEGORY_LABELS, SCENARIOS;
    let mulberry32, hashStringToSeed;
    let CHALLENGE_VERSION, CHALLENGE_ALPHABET;
    let encodeChallengeCode, decodeChallengeCode, generateRandomSeed, formatChallengeInfo, formatChallengeCodeInput;
    let CUSTOM_SCENARIOS_KEY, CUSTOM_SCENARIO_PREFIX;
    let loadCustomScenarios, saveCustomScenarios, mergeCustomScenarios, getAllScenarios, getScenarioById, formatSign;
    let validateScenarioConfig;

    // ===== localStorage 隔离机制 =====
    // 保存和恢复与测试相关的 localStorage key，避免测试污染真实游戏数据
    // 包含所有游戏相关的 storage key，确保完全隔离
    const STORAGE_KEYS_TO_SAVE = [
      "mountain_post_custom_scenarios",
      "mountain_post_achievements",
      "mountain_post_settings",
      "mountain_post_career",
      "mountain_post_archives",
      "mountain_post_tutorial_completed"
    ];
    let savedStorage = {};

    function backupStorage() {
      savedStorage = {};
      for (const key of STORAGE_KEYS_TO_SAVE) {
        savedStorage[key] = localStorage.getItem(key);
      }
    }

    function restoreStorage() {
      for (const key of STORAGE_KEYS_TO_SAVE) {
        if (savedStorage[key] === null || savedStorage[key] === undefined) {
          localStorage.removeItem(key);
        } else {
          localStorage.setItem(key, savedStorage[key]);
        }
      }
    }

    function clearTestStorage() {
      for (const key of STORAGE_KEYS_TO_SAVE) {
        localStorage.removeItem(key);
      }
    }

    function getAllStorageKeys() {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        keys.push(localStorage.key(i));
      }
      return keys;
    }

    function evalInGame(expr) {
      return gameWindow.eval(expr);
    }

    // ===== 游戏页面加载完成 =====
    function onGameLoaded() {
      try {
        const frame = document.getElementById("gameFrame");
        gameWindow = frame.contentWindow;

        // 注意：游戏代码使用 const/let 声明，不在 window 对象上
        // 需要通过 eval 在游戏页面的全局作用域中访问
        routesBase = evalInGame("routesBase");
        ALL_ROUTES_MAP = evalInGame("ALL_ROUTES_MAP");
        DIFF = evalInGame("DIFF");
        EVENTS_POOL = evalInGame("EVENTS_POOL");
        EVENT_CATEGORY_LABELS = evalInGame("EVENT_CATEGORY_LABELS");
        SCENARIOS = evalInGame("SCENARIOS");
        mulberry32 = evalInGame("mulberry32");
        hashStringToSeed = evalInGame("hashStringToSeed");
        CHALLENGE_VERSION = evalInGame("CHALLENGE_VERSION");
        CHALLENGE_ALPHABET = evalInGame("CHALLENGE_ALPHABET");
        encodeChallengeCode = evalInGame("encodeChallengeCode");
        decodeChallengeCode = evalInGame("decodeChallengeCode");
        generateRandomSeed = evalInGame("generateRandomSeed");
        formatChallengeInfo = evalInGame("formatChallengeInfo");
        formatChallengeCodeInput = evalInGame("formatChallengeCodeInput");
        CUSTOM_SCENARIOS_KEY = evalInGame("CUSTOM_SCENARIOS_KEY");
        CUSTOM_SCENARIO_PREFIX = evalInGame("CUSTOM_SCENARIO_PREFIX");
        loadCustomScenarios = evalInGame("loadCustomScenarios");
        saveCustomScenarios = evalInGame("saveCustomScenarios");
        mergeCustomScenarios = evalInGame("mergeCustomScenarios");
        getAllScenarios = evalInGame("getAllScenarios");
        getScenarioById = evalInGame("getScenarioById");
        formatSign = evalInGame("formatSign");
        validateScenarioConfig = evalInGame("validateScenarioConfig");

        // 验证关键函数存在
        const missing = [];
        if (!encodeChallengeCode) missing.push("encodeChallengeCode");
        if (!decodeChallengeCode) missing.push("decodeChallengeCode");
        if (!validateScenarioConfig) missing.push("validateScenarioConfig");
        if (!SCENARIOS) missing.push("SCENARIOS");
        if (!DIFF) missing.push("DIFF");

        if (missing.length > 0) {
          document.getElementById("runInfo").textContent = "⚠️ 未找到游戏函数: " + missing.join(", ");
          return;
        }

        testsReady = true;
        document.getElementById("runBtn").disabled = false;
        document.getElementById("runInfo").textContent = "✅ 真实游戏代码已加载，共 " + Object.keys(SCENARIOS).length + " 个内置剧本";

        // 自动运行测试
        setTimeout(runAllTests, 500);
      } catch (e) {
        document.getElementById("runInfo").textContent = "❌ 加载失败: " + e.message;
        console.error(e);
      }
    }

    // ===== 轻量测试框架 =====
    let testSuites = [];
    let currentSuite = null;

    function describe(name, fn) {
      currentSuite = { name: name, tests: [], befores: [] };
      testSuites.push(currentSuite);
      fn();
      currentSuite = null;
    }

    function it(name, fn) {
      if (!currentSuite) return;
      currentSuite.tests.push({ name, fn });
    }

    function beforeEach(fn) {
      if (!currentSuite) return;
      currentSuite.befores.push(fn);
    }

    function expect(actual) {
      return {
        toBe: function(expected) {
          if (actual !== expected) {
            throw new Error(`期望 ${JSON.stringify(expected)}，实际 ${JSON.stringify(actual)}`);
          }
        },
        toEqual: function(expected) {
          const a = JSON.stringify(actual);
          const b = JSON.stringify(expected);
          if (a !== b) {
            throw new Error(`期望 ${b}，实际 ${a}`);
          }
        },
        toBeTruthy: function() {
          if (!actual) {
            throw new Error(`期望真值，实际 ${JSON.stringify(actual)}`);
          }
        },
        toBeFalsy: function() {
          if (actual) {
            throw new Error(`期望假值，实际 ${JSON.stringify(actual)}`);
          }
        },
        toBeNull: function() {
          if (actual !== null) {
            throw new Error(`期望 null，实际 ${JSON.stringify(actual)}`);
          }
        },
        toBeUndefined: function() {
          if (actual !== undefined) {
            throw new Error(`期望 undefined，实际 ${JSON.stringify(actual)}`);
          }
        },
        toBeGreaterThan: function(expected) {
          if (actual <= expected) {
            throw new Error(`期望大于 ${expected}，实际 ${actual}`);
          }
        },
        toBeLessThan: function(expected) {
          if (actual >= expected) {
            throw new Error(`期望小于 ${expected}，实际 ${actual}`);
          }
        },
        toContain: function(item) {
          if (!actual || !actual.includes(item)) {
            throw new Error(`期望包含 ${JSON.stringify(item)}，实际 ${JSON.stringify(actual)}`);
          }
        },
        toHaveLength: function(len) {
          if (!actual || actual.length !== len) {
            throw new Error(`期望长度 ${len}，实际 ${actual ? actual.length : 'undefined'}`);
          }
        },
        toMatch: function(regex) {
          if (!regex.test(actual)) {
            throw new Error(`期望匹配 ${regex}，实际 ${JSON.stringify(actual)}`);
          }
        }
      };
    }

    // ===== 运行测试 =====
    function runAllTests() {
      if (!testsReady) {
        alert("游戏代码尚未加载完成，请稍候...");
        return;
      }

      const resultsEl = document.getElementById("testResults");
      const totalEl = document.getElementById("totalCount");
      const passEl = document.getElementById("passCount");
      const failEl = document.getElementById("failCount");
      const runInfo = document.getElementById("runInfo");

      resultsEl.innerHTML = "";
      let total = 0, pass = 0, fail = 0;
      const startTime = Date.now();

      // 测试前备份 localStorage
      backupStorage();

      try {
        for (const suite of testSuites) {
          const suiteEl = document.createElement("div");
          suiteEl.className = "test-suite";
          suiteEl.innerHTML = `<div class="test-suite-title">📋 ${suite.name}</div>`;

          for (const test of suite.tests) {
            total++;
            const testEl = document.createElement("div");
            testEl.className = "test-case";

            try {
              // 每个测试前：清理测试相关的 localStorage
              clearTestStorage();
              // 运行套件的 beforeEach
              for (const before of suite.befores) {
                before();
              }
              // 运行测试
              test.fn();

              pass++;
              testEl.classList.add("pass");
              testEl.innerHTML = `<span class="icon">✓</span><span class="name">${test.name}</span>`;
            } catch (e) {
              fail++;
              testEl.classList.add("fail");
              testEl.innerHTML = `
                <span class="icon">✗</span>
                <span class="name">${test.name}</span>
                <div class="error">${e.message}</div>
              `;
            }

            suiteEl.appendChild(testEl);
          }

          resultsEl.appendChild(suiteEl);
        }
      } finally {
        // 测试结束后恢复 localStorage
        restoreStorage();
      }

      totalEl.textContent = total;
      passEl.textContent = pass;
      failEl.textContent = fail;
      runInfo.textContent = `✅ 测试完成，耗时 ${Date.now() - startTime}ms（localStorage 已恢复）`;
    }

    // ===== 测试用例（与 run-tests.js 保持一致） =====

    // --- 挑战码格式化测试 ---
    describe("挑战码格式化 formatChallengeCodeInput", function() {
      it("空字符串返回空", function() {
        expect(formatChallengeCodeInput("")).toBe("");
        expect(formatChallengeCodeInput(null)).toBe("");
        expect(formatChallengeCodeInput(undefined)).toBe("");
      });

      it("小写字母自动转大写", function() {
        expect(formatChallengeCodeInput("abc")).toBe("ABC");
      });

      it("过滤非字母数字字符，但保留 I/O/0/1", function() {
        expect(formatChallengeCodeInput("A@B#C$")).toBe("ABC");
        expect(formatChallengeCodeInput("A B C")).toBe("ABC");
        expect(formatChallengeCodeInput("AIO01B")).toBe("AIO-B");
      });

      it("正确按 3-2-2 分段", function() {
        expect(formatChallengeCodeInput("ABCDEFG")).toBe("ABC-DE-FG");
      });

      it("不足 7 字符时正确分段", function() {
        expect(formatChallengeCodeInput("AB")).toBe("AB");
        expect(formatChallengeCodeInput("ABCD")).toBe("ABC-D");
        expect(formatChallengeCodeInput("ABCDE")).toBe("ABC-DE");
        expect(formatChallengeCodeInput("ABCDEF")).toBe("ABC-DE-F");
      });

      it("超过 7 字符时截断", function() {
        expect(formatChallengeCodeInput("ABCDEFGH")).toBe("ABC-DE-FG");
      });

      it("带连字符的输入也能正确清理和重格式化", function() {
        expect(formatChallengeCodeInput("abc-de-fg")).toBe("ABC-DE-FG");
        expect(formatChallengeCodeInput("AB-CDE-FG")).toBe("ABC-DE-FG");
      });
    });

    // --- 挑战码生成测试 ---
    describe("挑战码生成 encodeChallengeCode", function() {
      it("生成的挑战码符合 ABC-DE-FG 格式", function() {
        const code = encodeChallengeCode("standard", "normal", 12345);
        expect(code).toMatch(/^[A-Z2-9]{3}-[A-Z2-9]{2}-[A-Z2-9]{2}$/);
      });

      it("只使用字母表中的字符", function() {
        const code = encodeChallengeCode("standard", "normal", 42);
        const clean = code.replace(/-/g, "");
        for (const ch of clean) {
          expect(CHALLENGE_ALPHABET.includes(ch)).toBeTruthy();
        }
      });

      it("相同参数生成相同结果（确定性）", function() {
        const code1 = encodeChallengeCode("standard", "normal", 100);
        const code2 = encodeChallengeCode("standard", "normal", 100);
        expect(code1).toBe(code2);
      });

      it("不同剧本生成不同编码", function() {
        const code1 = encodeChallengeCode("standard", "normal", 100);
        const code2 = encodeChallengeCode("caravan", "normal", 100);
        expect(code1 !== code2).toBeTruthy();
      });

      it("不同难度生成不同编码", function() {
        const code1 = encodeChallengeCode("standard", "safe", 100);
        const code2 = encodeChallengeCode("standard", "hard", 100);
        expect(code1 !== code2).toBeTruthy();
      });

      it("不同种子生成不同编码", function() {
        const code1 = encodeChallengeCode("standard", "normal", 100);
        const code2 = encodeChallengeCode("standard", "normal", 200);
        expect(code1 !== code2).toBeTruthy();
      });

      it("无效剧本ID回退到第 0 个剧本", function() {
        const code1 = encodeChallengeCode("nonexistent", "normal", 50);
        const code2 = encodeChallengeCode("standard", "normal", 50);
        expect(code1).toBe(code2);
      });

      it("无效难度回退到 normal", function() {
        const code1 = encodeChallengeCode("standard", "invalid", 50);
        const code2 = encodeChallengeCode("standard", "normal", 50);
        expect(code1).toBe(code2);
      });

      it("种子为 0 时也能生成有效编码", function() {
        const code = encodeChallengeCode("standard", "normal", 0);
        expect(code).toMatch(/^[A-Z2-9]{3}-[A-Z2-9]{2}-[A-Z2-9]{2}$/);
      });

      it("大种子值（接近 2^32）也能正确编码", function() {
        const code = encodeChallengeCode("standard", "normal", 0xFFFFFFFF);
        expect(code).toMatch(/^[A-Z2-9]{3}-[A-Z2-9]{2}-[A-Z2-9]{2}$/);
      });
    });

    // --- 挑战码解码测试 ---
    describe("挑战码解码 decodeChallengeCode", function() {
      it("有效挑战码返回解码对象", function() {
        const code = encodeChallengeCode("standard", "normal", 42);
        const decoded = decodeChallengeCode(code);
        expect(decoded).toBeTruthy();
        expect(decoded.valid).toBe(true);
      });

      it("编码后解码能还原剧本和难度", function() {
        const testCases = [
          { sc: "standard", diff: "safe" },
          { sc: "standard", diff: "normal" },
          { sc: "standard", diff: "hard" },
          { sc: "medshortage", diff: "normal" },
          { sc: "caravan", diff: "hard" },
          { sc: "rescue", diff: "safe" },
        ];
        for (const tc of testCases) {
          const code = encodeChallengeCode(tc.sc, tc.diff, 999);
          const decoded = decodeChallengeCode(code);
          expect(decoded.scenarioId).toBe(tc.sc);
          expect(decoded.difficulty).toBe(tc.diff);
        }
      });

      it("空输入返回 null", function() {
        expect(decodeChallengeCode("")).toBeNull();
        expect(decodeChallengeCode(null)).toBeNull();
        expect(decodeChallengeCode(undefined)).toBeNull();
      });

      it("长度不足返回 null", function() {
        expect(decodeChallengeCode("ABC")).toBeNull();
        expect(decodeChallengeCode("ABC-DE")).toBeNull();
      });

      it("长度超过返回 null", function() {
        expect(decodeChallengeCode("ABC-DE-FGH")).toBeNull();
      });

      it("包含非法字符返回 null", function() {
        expect(decodeChallengeCode("ABI-DE-FG")).toBeNull();
        expect(decodeChallengeCode("AB0-DE-FG")).toBeNull();
      });

      it("小写字母也能正确解码", function() {
        const code = encodeChallengeCode("standard", "normal", 777);
        const decoded = decodeChallengeCode(code.toLowerCase());
        expect(decoded).toBeTruthy();
        expect(decoded.valid).toBe(true);
      });

      it("带多余格式符也能正确解析", function() {
        const code = encodeChallengeCode("standard", "normal", 123);
        const decoded = decodeChallengeCode("  " + code + "  ");
        expect(decoded).toBeTruthy();
      });

      it("formatted 字段格式正确", function() {
        const code = encodeChallengeCode("standard", "normal", 456);
        const decoded = decodeChallengeCode(code);
        expect(decoded.formatted).toMatch(/^[A-Z2-9]{3}-[A-Z2-9]{2}-[A-Z2-9]{2}$/);
      });

      it("解码出的 seed 是 32 位无符号整数", function() {
        const testSeeds = [0, 1, 1000, 0x7FFFFFFF, 0xFFFFFFFF];
        for (const seed of testSeeds) {
          const code = encodeChallengeCode("standard", "normal", seed);
          const decoded = decodeChallengeCode(code);
          expect(decoded.seed >>> 0).toBe(decoded.seed);
        }
      });
    });

    // --- 挑战码编解码往返测试 ---
    describe("挑战码编解码往返一致性", function() {
      it("encode 后 decode 能正确还原剧本ID", function() {
        const scenarioIds = Object.keys(SCENARIOS);
        for (const scId of scenarioIds) {
          const code = encodeChallengeCode(scId, "normal", 100);
          const decoded = decodeChallengeCode(code);
          expect(decoded.scenarioId).toBe(scId);
        }
      });

      it("encode 后 decode 能正确还原难度", function() {
        for (const diff of ["safe", "normal", "hard"]) {
          const code = encodeChallengeCode("standard", diff, 42);
          const decoded = decodeChallengeCode(code);
          expect(decoded.difficulty).toBe(diff);
        }
      });

      it("解码结果稳定（相同码总是解出相同种子）", function() {
        const code = encodeChallengeCode("standard", "normal", 42);
        const d1 = decodeChallengeCode(code);
        const d2 = decodeChallengeCode(code);
        expect(d1.seed).toBe(d2.seed);
        expect(d1.scenarioId).toBe(d2.scenarioId);
        expect(d1.difficulty).toBe(d2.difficulty);
      });

      it("解码出的 seed 是有效的 32 位无符号整数", function() {
        const testSeeds = [
          0, 1, 42, 100, 12345, 67890,
          0x7FFFFFFF, 0x80000000, 0xFFFFFFFF,
          0x5A5A5A5A, 0xA5A5A5A5
        ];
        for (const seed of testSeeds) {
          const code = encodeChallengeCode("standard", "normal", seed);
          const decoded = decodeChallengeCode(code);
          expect(decoded.seed >>> 0).toBe(decoded.seed);
          expect(decoded.seed >= 0).toBeTruthy();
          expect(decoded.seed <= 0xFFFFFFFF).toBeTruthy();
        }
      });

      it("不同种子生成不同挑战码", function() {
        const codes = new Set();
        for (let i = 0; i < 50; i++) {
          const code = encodeChallengeCode("standard", "normal", i * 12345);
          codes.add(code);
        }
        expect(codes.size).toBe(50);
      });

      it("formatted 字段与原始码格式一致", function() {
        const code = encodeChallengeCode("rescue", "hard", 9999);
        const decoded = decodeChallengeCode(code);
        expect(decoded.formatted).toBe(code);
      });
    });

    // --- 挑战码信息格式化 ---
    describe("挑战码信息 formatChallengeInfo", function() {
      it("null 输入返回 null", function() {
        expect(formatChallengeInfo(null)).toBeNull();
      });

      it("正确返回剧本名称和难度标签", function() {
        const code = encodeChallengeCode("standard", "normal", 42);
        const decoded = decodeChallengeCode(code);
        const info = formatChallengeInfo(decoded);
        expect(info.scenarioName).toBe("标准雪线");
        expect(info.difficultyLabel).toBe("标准");
        expect(info.seed).toBe(decoded.seed);
      });

      it("rescue 剧本正确显示", function() {
        const code = encodeChallengeCode("rescue", "hard", 42);
        const decoded = decodeChallengeCode(code);
        const info = formatChallengeInfo(decoded);
        expect(info.scenarioName).toBe("封山救援");
        expect(info.difficultyLabel).toBe("险境");
      });
    });

    // --- 剧本与难度匹配校验 ---
    describe("内置剧本配置校验", function() {
      it("所有内置剧本都通过 validateScenarioConfig 校验", function() {
        const scenarioIds = Object.keys(SCENARIOS);
        for (const scId of scenarioIds) {
          const sc = SCENARIOS[scId];
          const result = validateScenarioConfig(sc);
          if (!result.isValid) {

        const testSc = { id: "custom_test", name: "测试自定义剧本" };
        saveCustomScenarios({ custom_test: testSc });
        const all = getAllScenarios();
        expect(all.standard).toBeTruthy();
        expect(all.custom_test).toBeTruthy();
      });

      it("getScenarioById 能获取到剧本", function() {
        expect(getScenarioById("standard")).toBeTruthy();
        expect(getScenarioById("nonexistent")).toBeUndefined();
      });

      it("测试之间 localStorage 互相隔离（副作用不泄漏）", function() {
        // 这个测试验证：上一个测试保存的自定义剧本不会泄漏到这里
        // 因为 beforeEach 会清空
        const customs = loadCustomScenarios();
        expect(Object.keys(customs).length).toBe(0);
      });
    });

    // --- localStorage 隔离验证（额外安全检查） ---
    describe("localStorage 副作用隔离", function() {
      beforeEach(function() {
        clearTestStorage();
      });

      it("测试套件之间 localStorage 自定义剧本数据互相隔离", function() {
        const customs = loadCustomScenarios();
        expect(Object.keys(customs).length).toBe(0);
      });

      it("测试中修改的 localStorage 不会影响其他测试", function() {
        saveCustomScenarios({ test_leak: { id: "test_leak", name: "泄漏测试" } });
        const customs = loadCustomScenarios();
        expect(customs.test_leak).toBeTruthy();
      });

      it("上一个测试的保存不会泄漏到这个测试（验证 beforeEach 清理）", function() {
        const customs = loadCustomScenarios();
        expect(Object.keys(customs).length).toBe(0);
        expect(customs.test_leak).toBeUndefined();
      });
    });

    // --- 存储 key 完整性验证 ---
    describe("存储 key 与游戏代码一致性", function() {
      it("CUSTOM_SCENARIOS_KEY 值与隔离列表匹配", function() {
        expect(CUSTOM_SCENARIOS_KEY).toBe("mountain_post_custom_scenarios");
        expect(STORAGE_KEYS_TO_SAVE.includes(CUSTOM_SCENARIOS_KEY)).toBeTruthy();
      });

      it("游戏中所有 storage key 都在隔离列表中", function() {
        const gameKeys = [
          evalInGame("ACHIEVEMENT_STORAGE_KEY"),
          evalInGame("SETTINGS_STORAGE_KEY"),
          evalInGame("CAREER_STORAGE_KEY"),
          evalInGame("CUSTOM_SCENARIOS_KEY"),
          evalInGame("ARCHIVE_STORAGE_KEY"),
          evalInGame("TUTORIAL_STORAGE_KEY")
        ];
        for (const key of gameKeys) {
          expect(STORAGE_KEYS_TO_SAVE.includes(key)).toBeTruthy();
        }
      });
    });
  </script>
